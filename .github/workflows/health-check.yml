name: Zagros Health Check
on:
  push:
  pull_request:
    branches: [ main ]
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run health check
        run: bash scripts/health_check.sh
